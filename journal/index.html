<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>trading-hq</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav>
      <div class="nav-left">
        <span class="logo">Trading HQ</span>

        <div class="nav-links">
          <a href="../index.html">Home</a>
          <a href="../learn/beginner-path.html">Learn</a>
          <a href="../strategy/index.html">Strategy</a>
          <a href="../journal/index.html" class="active">Journal</a>
          <a href="../milestones/index.html">Milestones</a>
        </div>
      </div>
    </nav>

    <main class="journal">
      <!-- HEADER -->
      <section class="journal-header">
        <h1>Trading Journal</h1>
        <p>This exists to eliminate mistakes and enforce discipline.</p>
      </section>

      <!-- TOP GRID -->

      <section class="journal-top">
        <!-- LEFT: FORM -->
        <div class="card journal-form">
          <h2>Log a Trade</h2>

          <form id="tradeForm">
            <div class="form-layout">
              <!-- LEFT SIDE -->
              <div class="form-main">
                <div class="card inner-card">
                  <h3>Setup</h3>
                  <div class="setup-grid">
                    <label class="setup-card">
                      <input
                        type="radio"
                        name="setup"
                        value="Pullback to Structure"
                      />
                      <span>Pullback</span>
                    </label>

                    <label class="setup-card">
                      <input type="radio" name="setup" value="S/R Reaction" />
                      <span>S/R Reaction</span>
                    </label>

                    <label class="setup-card">
                      <input type="radio" name="setup" value="Break & Retest" />
                      <span>Break & Retest</span>
                    </label>
                  </div>
                </div>

                <div class="card inner-card">
                  <h3>Direction</h3>
                  <div class="toggle-group" id="directionToggle">
                    <button type="button" class="toggle-btn" data-value="buy">
                      Buy
                    </button>
                    <button type="button" class="toggle-btn" data-value="sell">
                      Sell
                    </button>
                  </div>
                </div>

                <div class="card inner-card">
                  <h3>Timeframe</h3>
                  <div class="toggle-group" id="timeframeToggle">
                    <button type="button" class="toggle-btn" data-value="1m">
                      1m
                    </button>
                    <button type="button" class="toggle-btn" data-value="5m">
                      5m
                    </button>
                    <button type="button" class="toggle-btn" data-value="1H">
                      1H
                    </button>
                    <button type="button" class="toggle-btn" data-value="4H">
                      4H
                    </button>
                  </div>
                </div>
              </div>

              <!-- RIGHT SIDE -->
              <div class="form-side">
                <div class="form-grid">
                  <label>
                    Market
                    <select id="market" required>
                      <option value="">Select</option>
                      <option value="XAUUSD">XAUUSD</option>
                      <option value="GBPUSD">GBPUSD</option>
                    </select>
                  </label>

                  <label>
                    Bias
                    <input type="text" id="bias" />
                  </label>

                  <label>
                    Risk (%)
                    <input type="number" id="risk" step="0.1" required />
                  </label>

                  <label>
                    Result (R)
                    <input type="number" id="result" step="0.1" required />
                  </label>

                  <label class="full">
                    Comments
                    <textarea id="comments"></textarea>
                  </label>
                </div>

                <div class="card inner-card">
                  <h3>Checklist</h3>

                  <div class="checklist-grid">
                    <label class="check-card">
                      <input
                        type="checkbox"
                        class="checklist-rule"
                        value="htf"
                      />
                      <span>HTF aligned</span>
                    </label>

                    <label class="check-card">
                      <input
                        type="checkbox"
                        class="checklist-rule"
                        value="entry"
                      />
                      <span>Valid entry</span>
                    </label>

                    <label class="check-card">
                      <input
                        type="checkbox"
                        class="checklist-rule"
                        value="risk"
                      />
                      <span>Risk OK</span>
                    </label>

                    <label class="check-card">
                      <input
                        type="checkbox"
                        class="checklist-rule"
                        value="emotion"
                      />
                      <span>No emotion</span>
                    </label>
                  </div>
                </div>
              </div>
            </div>

            <button type="submit" class="btn-primary">Save Trade</button>
          </form>
        </div>

        <!-- RIGHT: STATS -->
        <div class="card journal-stats">
          <h2>Performance</h2>

          <div class="stats-grid">
            <div class="stat-card">
              <p class="stat-label">Trades</p>
              <h2 class="stat-value" id="totalTrades">0</h2>
            </div>

            <div class="stat-card">
              <p class="stat-label">Win Rate</p>
              <h2 class="stat-value" id="winRate">0%</h2>
            </div>

            <div class="stat-card">
              <p class="stat-label">Avg R</p>
              <h2 class="stat-value" id="avgR">0</h2>
            </div>

            <div class="stat-card">
              <p class="stat-label">Expectancy</p>
              <h2 class="stat-value" id="expectancy">0</h2>
            </div>
          </div>
        </div>
      </section>

      <!-- HISTORY -->
      <section class="journal-history">
        <h2>Trade History</h2>
        <div id="tradeList"></div>
      </section>
    </main>

    <script src="../assets/js/journal.js"></script>
  </body>
</html>
