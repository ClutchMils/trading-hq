<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>trading-hq</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav>
      <div class="nav-left">
        <span class="logo">Trading HQ</span>

        <div class="nav-links">
          <a href="../index.html">Home</a>
          <a href="../learn/beginner-path.html">Learn</a>
          <a href="../strategy/index.html">Strategy</a>
          <a href="../journal/index.html" class="active">Journal</a>
          <a href="../milestones/index.html">Milestones</a>
        </div>
      </div>
    </nav>

    <main class="journal">
      <!-- HEADER -->
      <section class="journal-header">
        <h1>Trading Journal</h1>
        <p>This exists to eliminate mistakes and enforce discipline.</p>
      </section>

      <!-- TOP GRID -->
      <section class="journal-top">
        <!-- LOG TRADE -->
        <div class="card journal-form">
          <h2>Log a Trade</h2>

          <fieldset class="setup-fieldset">
            <legend>Setup Type</legend>

            <div class="setup-grid">
              <label
                ><input
                  type="checkbox"
                  name="setup"
                  value="Pullback to Structure"
                />
                Pullback</label
              >
              <label
                ><input type="checkbox" name="setup" value="S/R Reaction" /> S/R
                Reaction</label
              >
              <label
                ><input type="checkbox" name="setup" value="Break & Retest" />
                Break & Retest</label
              >
            </div>
          </fieldset>

          <form id="tradeForm">
            <div class="form-grid">
              <label>
                Market
                <select id="market" required>
                  <option value="">Select</option>
                  <option value="XAUUSD">XAUUSD</option>
                  <option value="GBPUSD">GBPUSD</option>
                </select>
              </label>

              <label>
                Timeframe
                <input type="text" id="timeframe" required />
              </label>

              <label>
                Bias
                <input type="text" id="bias" />
              </label>

              <label>
                Risk (%)
                <input type="number" id="risk" step="0.1" required />
              </label>

              <label>
                Result (R)
                <input type="number" id="result" step="0.1" required />
              </label>

              <label class="full">
                Lesson
                <textarea id="lesson"></textarea>
              </label>
            </div>

            <button type="submit" class="btn-primary">Save Trade</button>
          </form>
        </div>

        <!-- STATS -->
        <div class="card journal-stats">
          <h2>Performance</h2>

          <div class="stats-grid">
            <div class="stat-card">
              <p class="stat-label">Trades</p>
              <h2 class="stat-value" id="totalTrades">0</h2>
            </div>

            <div class="stat-card">
              <p class="stat-label">Win Rate</p>
              <h2 class="stat-value" id="winRate">0%</h2>
            </div>

            <div class="stat-card">
              <p class="stat-label">Avg R</p>
              <h2 class="stat-value" id="avgR">0</h2>
            </div>

            <div class="stat-card">
              <p class="stat-label">Expectancy</p>
              <h2 class="stat-value" id="expectancy">0</h2>
            </div>
          </div>
        </div>
      </section>

      <!-- HISTORY -->
      <section class="journal-history">
        <h2>Trade History</h2>
        <div id="tradeList"></div>
      </section>
    </main>

    <script src="../assets/js/journal.js"></script>
  </body>
</html>
