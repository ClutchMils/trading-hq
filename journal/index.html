<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>trading-hq</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <nav>
      <a href="../index.html">Home</a>
      <a href="../learn/market-basics.html">Learn</a>
      <a href="../learn/support-resistance.html">Support & Resistance</a>
      <a href="../learn/risk-management.html">Risk Management</a>
      <a href="../strategy/index.html">Strategy</a>
      <a href="#">Journal</a>
      <a href="#">Resources</a>
      <a href="../milestones/index.html">Milestones</a>
    </nav>
    <main>
      <h1>Trading Journal</h1>

      <p>
        This journal exists for one reason: to stop me from repeating the same
        mistakes.
      </p>
      <section>
        <h2>Log a Trade</h2>
        <div class="card">
          <fieldset class="setup-fieldset">
            <legend>Setup Type</legend>

            <div class="setup-grid">
              <label>
                <input
                  type="checkbox"
                  name="setup"
                  value="Pullback Continuation"
                />
                Pullback Continuation
              </label>

              <label>
                <input
                  type="checkbox"
                  name="setup"
                  value="Pullback to Structure"
                />
                Pullback to Structure
              </label>

              <label>
                <input
                  type="checkbox"
                  name="setup"
                  value="Reversal at Extremes"
                />
                Reversal at Extremes
              </label>

              <label>
                <input
                  type="checkbox"
                  name="setup"
                  value="Liquidity Grab Reversal"
                />
                Liquidity Grab Reversal
              </label>

              <label>
                <input type="checkbox" name="setup" value="Break & Retest" />
                Break & Retest
              </label>
            </div>
          </fieldset>

          <form id="tradeForm">
            <div class="form-grid">
              <label>
                Market
                <select id="market" required>
                  <option value="">Select Market</option>
                  <option value="XAUUSD">XAUUSD</option>
                  <option value="GBPUSD">GBPUSD</option>
                </select>
              </label>

              <label>
                Timeframe
                <input type="text" id="timeframe" required />
              </label>

              <label>
                Bias
                <input type="text" id="bias" />
              </label>

              <label>
                Risk (%)
                <input type="number" id="risk" step="0.1" required />
              </label>

              <label>
                Result (R)
                <input type="number" id="result" step="0.1" required />
              </label>

              <label class="full">
                Lesson
                <textarea id="lesson"></textarea>
              </label>
            </div>

            <button type="submit">Save Trade</button>
          </form>
        </div>
      </section>

      <!-- <hr /> -->

      <section>
        <h2>Journal Stats</h2>

        <div class="card stats-wrapper">
           <div class="stats-grid">
          <div class="card stat-card">
            <p class="stat-label">Total Trades</p>
            <h2 class="stat-value" id="totalTrades">0</h2>
          </div>

          <div class="card stat-card">
            <p class="stat-label">Win Rate</p>
            <h2 class="stat-value" id="winRate">0%</h2>
          </div>

          <div class="card stat-card">
            <p class="stat-label">Average R</p>
            <h2 class="stat-value" id="avgR">0</h2>
          </div>

          <div class="card stat-card">
            <p class="stat-label">Expectancy</p>
            <h2 class="stat-value" id="expectancy">0</h2>
          </div>
        </div>
        </div>
       

      </section>
      <!-- <hr /> -->
      <section>
        <h2>Trade History</h2>
        <div id="tradeList"></div>
      </section>
    </main>

    <script src="../assets/js/journal.js"></script>
  </body>
</html>
